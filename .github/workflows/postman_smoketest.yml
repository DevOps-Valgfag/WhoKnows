name: Automated local API tests using Postman CLI

on: 
  push:
    branches: [featureSmoketestPostman]

jobs:
  automated-local-api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new_app_ruby

    steps:
      # 1. Tjek koden ud
      - uses: actions/checkout@v4

      # 2. Bekræft repo-struktur
      - name: List repo structure
        run: |
          pwd
          ls -al

      # 3. Sæt Ruby op
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      # 4. Installer systemafhængigheder (som i Dockerfile)
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-0 libsqlite3-dev ca-certificates curl sqlite3

      # 5. Installer gems
      - name: Install gems
        run: bundle install

      # 6. Debug Ruby-miljø
      - name: Debug Ruby environment
        run: |
          ruby -v
          which ruby
          bundle list

      # 7. Sørg for at SQLite DB findes
      - name: Ensure SQLite DB exists
        run: |
          if [ ! -f whoknows.db ]; then
            echo "Creating empty SQLite DB..."
            sqlite3 whoknows.db "VACUUM;"
          fi

      # 8. Kør app i foreground (så vi ser fejl direkte)
      - name: Start app (debug in foreground)
        run: |
          echo "Starting Ruby app in foreground..."
          ruby app.rb || echo "Ruby exited with code $?"

      # 9. Upload evt. debug-log (hvis app.rb selv skriver noget til fil)
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: new_app_ruby/*.log

      # (Stop her for debug — Postman-delen først når app kører stabilt)
